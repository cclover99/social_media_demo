name: Deploy to VPS

on:
  push:
    # branches: [ main ]

  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Github Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          # Converts repository owner to strict lowercase for Docker compatibility
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$OWNER/social-media-demo:latest .
          docker push ghcr.io/$OWNER/social-media-demo:latest

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_social_deploy
          chmod 600 ~/.ssh/github_social_deploy

          # Sometimes ssh-keyscan on github's end fails, try 3 times
          for i in 1 2 3; do
            ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts && break
            sleep 5
          done

      - name: Copy relevant files to VPS
        run: |
          scp -i ~/.ssh/github_social_deploy \
            docker-compose.yml schema.sql \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/social_media_demo/
        
      - name: Deploy Docker container via SSH
        run: |
          ssh -i ~/.ssh/github_social_deploy \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            bash << 'EOF'
            set -ex
            export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export GH_ACTOR="${{ github.actor }}"
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            cd /var/www/social_media_demo/
            docker compose pull
            docker compose up -d
          EOF
