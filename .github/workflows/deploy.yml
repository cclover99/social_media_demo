name: Deploy to VPS

on:
  push:
    branches: [ main ]

  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Github Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          # Converts repository owner to strict lowercase for Docker compatibility
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$OWNER/social_media_demo:latest .
          docker push ghcr.io/$OWNER/social_media_demo:latest

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_social_deploy
          chmod 600 ~/.ssh/github_social_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/github_social_deploy -T ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            GH_ACTOR="${{ github.actor }}" \
            bash -s << 'EOF'

            # Echo evey command
            set -x
            
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            
            cd /var/www/social_media_demo/
            
            docker compose pull
            docker compose up -d --build
          EOF
